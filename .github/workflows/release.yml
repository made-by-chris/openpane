name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: openpane-x86_64-unknown-linux-gnu.tar.gz
            binary: openpane
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: openpane-x86_64-pc-windows-msvc.zip
            binary: openpane.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset: openpane-x86_64-apple-darwin.tar.gz
            binary: openpane
          - os: macos-14
            target: aarch64-apple-darwin
            asset: openpane-aarch64-apple-darwin.tar.gz
            binary: openpane

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/openpane
          tar -C dist -czf "${{ matrix.asset }}" openpane

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/openpane.exe"
          Compress-Archive -Path "dist/openpane.exe" -DestinationPath "${{ matrix.asset }}" -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
